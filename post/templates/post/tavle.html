<!DOCTYPE html>
<html lang ="no">
<head>
    <meta charset="UTF-8">
    <title>Post-IT Tavle</title>
    <script src ="https://cdn.tailwindcss.com"> </script>

</head>
<body class ="bg-gray-100 p-8">

    <h1 class ="text-3x1 font-bold mb-8">Forslagstavle </h1>

    <form method ="POST" class ="bg-white p-6 rounded shadow mb-8 max-w-md">
        {% csrf_token %}
        <input name = "tittel" placeholder = "Tittel" required
                class = "w-full border p-2 rounded mb-4">
        <textarea name = "innhold" placeholder = "Beskriv forslaget" required
                class = "w-full border p-2 rounded mb-4"> </textarea>
        <button type = "submit" class="bg-green-200 px-4 py-2 rounded font-bold">
            Legg til forslag
        </button>
    </form>

    <div class ="grid grid-cols-3 gap-4">
        {% for kolonne, farge, label in kolonner %}
        <div class = "bg-white rounded shadow p-4"> 
            <h2 class = "font-bold text-lg mb-4"> {{label}} </h2>
            <div class = "kolonne min-h-32 flex flex-col gap-3" data-status = "{{kolonne}}">
                {% for f in forslag %}
                {% if f.status == kolonne %}
                <div class = "post-it p-4 rounded shadow cursor-grab {{farge}}" draggable = "true" data-id = "{{f.id}}"> 
                    <h3 class = "font-bold"> {{f.tittel}} </h3>
                    <p class = "text-sm mt-1"> {{f.innhold}} </p>
                    <p class="text-xs text-gray-500 mt-2">{{f.opprettet|date:"d.m.Y H:i"}} </p>            
                    <form method = "POST" action = "{% url 'slett' f.id %}" class = "mt-2"> 
                        {% csrf_token %}
                        <button type = "submit" class = "text-xs text-red-500 hover:underline">
                            Slett
                        </button>
                    </form>
                </div>
                {% endif %}
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </div>

    <form method = "POST" id = "statusForm" action = "" class = "hidden">
        {% csrf_token %}
        <input type = "hidden" name = "status" id = "statusInput">
    </form>

    <script>
        const postITs = document.querySelectorAll('.post-it');
        const kolonner = document.querySelectorAll('.kolonne');
        let dragged = null;

        postITs.forEach(postIt => {
            postIt.addEventListener('dragstart', () => dragged = postIt);
        });

        kolonner.forEach(kolonne => {
            kolonne.addEventListener('dragover', event => event.preventDefault());
            kolonne.addEventListener('drop', () => {
                if (!dragged) return;
                const nyStatus = kolonne.dataset.status;
                const id = dragged.dataset.id;
                const form = document.getElementById('statusForm');
                form.action = `/oppdater/${id}/`;
                document.getElementById('statusInput').value = nyStatus;
                form.submit();
            });
        });
    </script>




</body>

</html>
