<!DOCTYPE html>
<html lang ="no">
<head>
    <meta charset="UTF-8">
    <title>Post-IT Tavle</title>
    <script src ="https://cdn.tailwindcss.com"> </script>

</head>
<body class ="bg-gray-100 p-8">

    <h1 class ="text-3x1 font-bold mb-8">Forslagstavle </h1>

    <form method ="POST" class ="bg-white p-6 rounded shadow mb-8 max-w-md">
        {% csrf_token %}
        <input name = "tittel" placeholder = "Tittel" required
                class = "w-full border p-2 rounded mb-4">
        <textarea name = "innhold" placeholder = "Beskriv forslaget" required
                class = "w-full border p-2 rounded mb-4"> </textarea>
        <button type = "submit" class="bg-yellow-400 px-4 py-2 rounded font-bold">
            Legg til forslag
        </button>
    </form>

    <div class ="grid grid-cols-1 md:grid-cols-3 gap-4">
        {% for f in forslag %}
        <div class = "bg-yellow-200 p-4 rounded shadow">
            <h2 class = "font-bold text-lg"> {{ f.tittel }} </h2>
            <p class = "mt-2"> {{ f.innhold }} </p>
            <p class = "text-sm text-gray-500 mt-4"> {{ f.opprettet|date:"d.m.Y H:i" }} </p>
        </div>
        {% empty %}
        <p class = "text-gray-500"> Tomt! </p>
        {% endfor %}
    </div>

</body>

</html>
